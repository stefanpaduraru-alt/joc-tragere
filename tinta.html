<!DOCTYPE html>
<html>
  <head>
    <title>VR Target Practice - A-Frame</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://unpkg.com/aframe-environment-component@1.3.3/dist/aframe-environment-component.min.js"></script>
  </head>
  <body>
    <a-scene>
      <a-entity environment="preset: midnight; dressingAmount: 50"></a-entity>

      <a-entity id="hud" position="0 2 -3">
        <a-text id="score-text" value="Scor: 0" color="#DEFF9A" position="-1 0.5 0" align="center"></a-text>
        <a-text id="timer-text" value="Timp: 30" color="#FF5555" position="1 0.5 0" align="center"></a-text>
        <a-text id="msg-text" value="Apasa START pentru a incepe" color="white" position="0 0 0" align="center" scale="0.8"></a-text>
      </a-entity>

      <a-box id="start-btn" position="0 1 -2" width="1" height="0.5" depth="0.2" color="#4CC3D9"
             class="interactive">
        <a-text value="START" align="center" position="0 0 0.15" color="white" width="4"></a-text>
      </a-box>

      <a-entity camera look-controls position="0 1.6 0">
        <a-cursor id="cursor" color="#DEFF9A" raycaster="objects: .interactive"></a-cursor>
      </a-entity>

      <a-entity id="targets-container"></a-entity>
    </a-scene>

    <script>
      let score = 0;
      let timeLeft = 30;
      let gameActive = false;
      let timerInterval;

      const scoreText = document.querySelector('#score-text');
      const timerText = document.querySelector('#timer-text');
      const msgText = document.querySelector('#msg-text');
      const startBtn = document.querySelector('#start-btn');
      const targetsContainer = document.querySelector('#targets-container');

      // Functie pentru a genera o tinta noua
      function spawnTarget() {
        if (!gameActive) return;

        const target = document.createElement('a-sphere');
        target.setAttribute('radius', '0.3');
        target.setAttribute('color', '#DEFF9A');
        target.setAttribute('class', 'interactive');
        
        // Pozitie aleatorie in fata playerului
        const x = (Math.random() - 0.5) * 6; // intre -3 si 3
        const y = Math.random() * 2 + 1;     // intre 1 si 3 metri inaltime
        const z = -Math.random() * 5 - 2;    // intre -2 si -7 metri adancime
        
        target.setAttribute('position', `${x} ${y} ${z}`);

        // Event cand tinta este "impuscata" (apasata)
        target.addEventListener('click', () => {
          if (gameActive) {
            score++;
            scoreText.setAttribute('value', `Scor: ${score}`);
            target.parentNode.removeChild(target); // Sterge tinta actuala
            spawnTarget(); // Spawneaza alta imediat
          }
        });

        targetsContainer.appendChild(target);
      }

      // Logica butonului de Start
      startBtn.addEventListener('click', () => {
        if (gameActive) return;

        // Resetare joc
        score = 0;
        timeLeft = 30;
        gameActive = true;
        scoreText.setAttribute('value', `Scor: ${score}`);
        timerText.setAttribute('value', `Timp: ${timeLeft}`);
        msgText.setAttribute('value', 'Trage in tinte!');
        startBtn.setAttribute('visible', 'false');
        startBtn.setAttribute('scale', '0 0 0'); // Il ascundem de tot

        // Pornire cronometru
        timerInterval = setInterval(() => {
          timeLeft--;
          timerText.setAttribute('value', `Timp: ${timeLeft}`);

          if (timeLeft <= 0) {
            endGame();
          }
        }, 1000);

        spawnTarget();
      });

      function endGame() {
        gameActive = false;
        clearInterval(timerInterval);
        msgText.setAttribute('value', `JOC TERMINAT! Scor final: ${score}`);
        timerText.setAttribute('value', 'Timp: 0');
        
        // Curatam tintele ramase
        targetsContainer.innerHTML = '';
        
        // Afisam butonul inapoi dupa 3 secunde pentru restart
        setTimeout(() => {
          startBtn.setAttribute('visible', 'true');
          startBtn.setAttribute('scale', '1 1 1');
          msgText.setAttribute('value', 'Apasa START pentru a reincepe');
        }, 3000);
      }
    </script>
  </body>
</html>
